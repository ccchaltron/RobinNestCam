<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robin Nest Cam</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="hero">
<h1>🐦 Robin Nest Cam</h1>
<p>Live 24/7 from Clinton Township, Michigan</p>
</header>

<section class="player">
<h2>Watch Live</h2>
<div class="video">
<iframe width="100%" height="500"
src="https://www.youtube.com/embed/live_stream?channel=UC8mjCBKCXO_K7lx5FrZw4VQ"
allowfullscreen></iframe>
</div>
</section>

<section class="status">
<h2>Nest Status</h2>
<div class="cards">
<div class="card"><h3>🥚 Eggs</h3><p id="eggs">3</p></div>
<div class="card"><h3>🐣 Hatched</h3><p id="hatched">0</p></div>
<div class="card"><h3>📅 Incubation Day</h3><p id="day">6</p></div>
</div>
</section>

<section class="update">
<h2>Latest Update</h2>
<p id="update">Mom robin continues faithfully incubating the three beautiful blue eggs.</p>
</section>

<footer>© 2026 Robin Nest Cam</footer>

<script>
fetch('status.json')
.then(r=>r.json())
.then(s=>{
document.getElementById('eggs').textContent=s.eggs;
document.getElementById('hatched').textContent=s.hatched;
document.getElementById('day').textContent=s.day;
document.getElementById('update').textContent=s.update;
})
.catch(()=>console.log("Using built-in values"));
</script>

</body>
</html>
